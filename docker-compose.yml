x-shared-env: &shared-env
  DATA_DIR: /app/data
  # Containers use service DNS names; host-side CLI values in .env must not leak here.
  DATABASE_URL: postgresql+psycopg://extraction:extraction@postgres:5432/extraction
  REDIS_URL: redis://redis:6379/0
  STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
  STORAGE_LOCAL_ROOT: /app/data/objects
  S3_BUCKET: ${S3_BUCKET:-extraction}
  S3_PREFIX: ${S3_PREFIX:-production}
  S3_ENDPOINT_URL: http://minio:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
  MINERU_API_KEY: ${MINERU_API_KEY:-}
  MINERU_API_BASE_URL: ${MINERU_API_BASE_URL:-https://mineru.net}
  MINERU_MODEL_VERSION: ${MINERU_MODEL_VERSION:-vlm}
  MINERU_LANGUAGE: ${MINERU_LANGUAGE:-en}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-${LLM_BASE_URL:-https://api.openai.com/v1}}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-${LLM_API_KEY:-}}
  OPENAI_MODEL: ${OPENAI_MODEL:-${LLM_MODEL:-gpt-4o-mini}}
  LLM_BASE_URL: ${LLM_BASE_URL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-}
  LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
  LLM_API_FORMAT: ${LLM_API_FORMAT:-openai_chat}
  LLM_LORA_ID: ${LLM_LORA_ID:-}
  LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-100}
  LLM_MIN_REQUEST_INTERVAL_SECONDS: ${LLM_MIN_REQUEST_INTERVAL_SECONDS:-0}
  LLM_ALLOW_NON_STREAM_FALLBACK: ${LLM_ALLOW_NON_STREAM_FALLBACK:-True}
  LLM_ALLOW_ROOT_CHAT_FALLBACK: ${LLM_ALLOW_ROOT_CHAT_FALLBACK:-False}
  IMAGE_EXTRACTION_WORKER_CONCURRENCY: ${IMAGE_EXTRACTION_WORKER_CONCURRENCY:-100}
  VLM_BASE_URL: ${VLM_BASE_URL:-}
  VLM_API_KEY: ${VLM_API_KEY:-}
  VLM_MODEL: ${VLM_MODEL:-}
  VLM_FALLBACK_MODELS: ${VLM_FALLBACK_MODELS:-${LLM_FALLBACK_MODELS:-}}
  VLM_API_FORMAT: ${VLM_API_FORMAT:-}
  VLM_LORA_ID: ${VLM_LORA_ID:-}
  VLM_MAX_CONCURRENCY: ${VLM_MAX_CONCURRENCY:-${LLM_MAX_CONCURRENCY:-100}}
  VLM_MIN_REQUEST_INTERVAL_SECONDS: ${VLM_MIN_REQUEST_INTERVAL_SECONDS:-${LLM_MIN_REQUEST_INTERVAL_SECONDS:-0}}
  VLM_ALLOW_NON_STREAM_FALLBACK: ${VLM_ALLOW_NON_STREAM_FALLBACK:-True}
  VLM_ALLOW_ROOT_CHAT_FALLBACK: ${VLM_ALLOW_ROOT_CHAT_FALLBACK:-False}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: extraction
      POSTGRES_USER: extraction
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-extraction}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extraction -d extraction"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY}; do sleep 1; done &&
        mc mb --ignore-existing local/$${S3_BUCKET} &&
        mc version enable local/$${S3_BUCKET}
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-extraction}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *shared-env
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "-u", "-m", "app.worker"]
    environment:
      <<: *shared-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
