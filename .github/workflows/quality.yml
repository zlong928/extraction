name: quality

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install vulture pydeps flake8 pytest-cov

      - name: Vulture dead-code scan
        run: |
          vulture app content_pipeline tests --min-confidence 90

      - name: Reverse import/cycle scan
        run: |
          pydeps --show-cycles --no-dot app
          pydeps --show-cycles --no-dot content_pipeline
          if pydeps --show-deps --no-dot content_pipeline | grep -q '"app\.'; then
            echo "content_pipeline should not import app packages"
            exit 1
          fi

      - name: Flake8 line length check
        run: |
          flake8 \
            app/api/extractions.py \
            app/services/image_extraction.py \
            app/services/mineru_asset_builder.py \
            app/services/mineru_asset_builder_panel_context.py \
            app/services/mineru_asset_builder_paths.py \
            app/services/mineru_parser.py \
            app/worker.py \
            content_pipeline/llm/phase_runner.py \
            content_pipeline/metrics/metric_projector.py \
            content_pipeline/mineru/image_path_resolver.py \
            tests/test_real_pipeline_data.py

      - name: File line length limit
        run: |
          python scripts/check_file_limits.py app content_pipeline --max-lines 1500

      - name: Test coverage gate
        run: |
          pytest --cov --cov-fail-under=60
